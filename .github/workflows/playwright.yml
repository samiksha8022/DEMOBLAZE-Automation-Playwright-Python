name: Playwright Python CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Manual trigger bhi kar sakte ho

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest

    steps:
      # Step 1: Code checkout karo
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Python setup karo
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Dependencies install karo
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-playwright playwright

      # Step 4: Playwright browsers install karo
      - name: Install Playwright Browsers
        run: playwright install --with-deps chromium

      # Step 5: Tests run karo
      - name: Run Playwright Tests
        run: |
          pytest Tests/ -v --tb=short 2>&1 | tee test-results.txt
        continue-on-error: true

      # Step 6: Screenshots upload karo (agar test fail ho)
      - name: Upload Screenshots on Failure
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: |
            screenshots/
            screenshots_4/
          if-no-files-found: ignore

      # Step 7: Test results upload karo
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.txt
          if-no-files-found: ignore
